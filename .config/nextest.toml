# nextest profiles. The "loop" profile is used by the second-loop T2 eval tier
# (.secondloop/hooks.toml): it emits JUnit XML that the loop parses to prove
# evals fail pre-implementation and pass post-implementation.
[profile.loop.junit]
path = "junit.xml"

# Some history-core tests mutate process-wide state (env vars like HOME), same
# reason CI runs cargo test with --test-threads=1.
[profile.loop]
test-threads = 1

# CI profile used by .github/workflows/rust-tests.yml (Test Suite job). It lived
# in src-tauri/.config/nextest.toml until the crates extraction moved the
# workspace root here — nextest reads the root config, so the `ci` profile has to
# live here now or `--profile ci` errors ("profile 'ci' not found"). test-threads
# = 1 because the workspace aggregates the process-wide-state tests (HOME etc.).
[profile.ci]
retries = 3
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }
test-threads = 1

[profile.ci.junit]
path = "ci/junit.xml"
