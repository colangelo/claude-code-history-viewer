# Build and publish a GitHub Release for the fork's own `cchv-v*` version tags.
#
# This fork ships only the web viewer + archive stack (no desktop distribution),
# so `cchv-v*` is the single release line — see CLAUDE.md → Version Management.
# Upstream's `v1.x` tags (fetched for the parser supply chain) are NOT ours and
# do not trigger a release here.
#
# Self-contained: this workflow creates its own release and attaches, on every
# tag push, the two artifacts the m4m deploy actually consumes — the static
# archive webapp bundle and the macOS/arm64 hub binary with its .sha256
# (docs/archive/deployment.md §2b/§2c).
#
# The per-platform WebUI *server* binaries (rust-embed → single self-contained
# file, no external dist/) remain DISPATCH-ONLY: nothing consumes them today.
# If a non-local host ever needs them, run this workflow manually ON THE TAG REF
# (gh workflow run server-release.yml --ref cchv-vX.Y.Z) and the matrix attaches
# them to that tag's release.
name: Server Release

on:
  push:
    tags:
      - "cchv-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    # Runs on tag push AND on dispatch (idempotent: view-or-create + --clobber),
    # but never on a dispatch against a branch ref — that would mint a release
    # named after the branch.
    if: startsWith(github.ref, 'refs/tags/cchv-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build static archive webapp bundle
        run: |
          just archive-web-build
          tar czf cchv-webapp.tar.gz -C dist-archive .

      - name: Create release and attach the webapp bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" cchv-webapp.tar.gz --clobber

  build-hub:
    # Runs on tag push: the m4m hub IS deployed from this asset (see
    # docs/archive/deployment.md §2b). Publishing the binary plus its .sha256
    # is what lets infra stage the swap without a local cargo build, a
    # cross-Mac scp, or the "swap <sha>: pushed or staged?" round trip.
    # macOS/arm64 only — that is the one host that runs the hub.
    if: startsWith(github.ref, 'refs/tags/cchv-v')
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build hub binary
        # Offline: the sqlx macros read .sqlx/, no database on the runner.
        env:
          SQLX_OFFLINE: 'true'
        run: cargo build --release -p hub --target aarch64-apple-darwin

      - name: Package binary and checksum
        run: |
          VERSION="${GITHUB_REF_NAME#cchv-v}"
          ASSET="cchv-hub-${VERSION}-aarch64-apple-darwin"
          cp "target/aarch64-apple-darwin/release/hub" "$ASSET"
          # Bare filename in the .sha256 so `shasum -a 256 -c` works as-is
          # after download, on any host.
          shasum -a 256 "$ASSET" > "$ASSET.sha256"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "$ASSET" "$ASSET.sha256" --clobber

  build-server:
    # Dispatch-only (see header): tag pushes skip the 4-platform matrix.
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/cchv-v')
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: cchv-server-linux-x64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: cchv-server-linux-arm64
            cross: true
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact: cchv-server-macos-arm64
          - platform: macos-14
            target: x86_64-apple-darwin
            artifact: cchv-server-macos-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (ubuntu x64)
        if: matrix.platform == 'ubuntu-22.04' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cross-compilation tools (linux-arm64)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libssl-dev:arm64 libglib2.0-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 patchelf
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add macOS x86_64 target
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build frontend (rust-embed requires dist/ at compile time)
        run: just frontend-build

      - name: Build server binary
        run: cd src-tauri && cargo build --release --features webui-server --target ${{ matrix.target }}

      - name: Package single binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/claude-code-history-viewer release/cchv-server
          cd release && tar czf ../${{ matrix.artifact }}.tar.gz cchv-server

      - name: Upload to release
        run: gh release upload "${GITHUB_REF_NAME}" "${{ matrix.artifact }}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
